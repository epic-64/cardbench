name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies (jsdom for ScalaJS tests)
        run: npm install

      - name: Install sbt
        run: |
          curl -L https://github.com/sbt/sbt/releases/download/v1.12.1/sbt-1.12.1.tgz | tar xz
          echo "$(pwd)/sbt/bin" >> $GITHUB_PATH

      - name: Compile JVM sources
        run: sbt clean 'project jvm' Test/compile

      - name: Run JVM tests
        run: sbt 'project jvm' test

      - name: Run JS tests with fullLinkJS
        run: sbt -J-Xmx4G 'project js' 'set Test/scalaJSStage := FullOptStage' 'test'
